<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaashif Nerekar</title>

<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #4f46e5);
  color: white;
}

/* NAVBAR */
nav {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.hero h1 {
  font-size: 70px;
  background: linear-gradient(to right, #fff, #c7d2fe);
  -webkit-background-clip: text;
  color: transparent;
}

.hero p {
  opacity: 0.8;
  font-size: 22px;
}

/* BUTTONS */
.btn {
  padding: 12px 25px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
}

.primary {
  background: #6366f1;
  color: white;
}

.secondary {
  border: 1px solid white;
  color: white;
}

/* SECTION */
.section {
  min-height: 100vh;
  padding: 80px 20px;
  max-width: 1000px;
  margin: auto;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 15px;
  margin: 20px 0;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <div><b>KN</b></div>
  <div>
    <a href="#about">About</a>
    <a href="#experience">Experience</a>
    <a href="#skills">Skills</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Kaashif Nerekar</h1>
  <p>Manual QA Tester</p>

  <button class="btn primary">View Experience</button>
  <button class="btn secondary">LinkedIn</button>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>About</h2>
  <div class="card">
    <p>Manual QA Tester with 2 years experience in testing and bug tracking.</p>
  </div>
</div>

<!-- EXPERIENCE -->
<div class="section" id="experience">
  <h2>Experience</h2>
  <div class="card">
    <p>Technical Analyst – ZI Systech</p>
  </div>
</div>

<!-- SKILLS -->
<div class="section" id="skills">
  <h2>Skills</h2>
  <div class="card">
    <p>Manual Testing, API Testing, Azure DevOps</p>
  </div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>Contact</h2>
  <div class="card">
    <p>Email: kaashifnerekar@gmail.com</p>
  </div>
</div>

</body>
</html>
